<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 紐西蘭南島 14 天</title>
  <style>
    :root {
      --g-dark:#2D6A4F;--g-mid:#40916C;--g-light:#74C69D;--g-pale:#D8F3DC;
      --beige:#F7F2E8;--sand:#EBE2CE;--sand-d:#C9B99A;--cream:#FFFDF6;
      --td:#1B2D22;--tm:#4A5C4E;--tl:#8A9E8E;
      --rd:#2C4F6A;--rm:#4A7C9E;--rl:#D4EAF7;--star:#F5A623;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--beige);color:var(--td);max-width:540px;margin:0 auto;min-height:100vh}
    .hdr{background:linear-gradient(150deg,var(--g-dark),var(--g-mid));padding:18px 18px 14px;position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,.2)}
    .hdr-row{display:flex;align-items:center;gap:11px}
    .hdr-leaf{font-size:28px;flex-shrink:0}
    .hdr-t{color:#fff;font-size:18px;font-weight:700}
    .hdr-s{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px}
    .day-pill{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
    .prog-wrap{margin-top:12px}
    .prog-track{background:rgba(255,255,255,.22);border-radius:8px;height:5px;overflow:hidden}
    .prog-fill{height:100%;background:var(--g-pale);border-radius:8px;transition:width .4s ease;width:0%}
    .prog-lbl{color:rgba(255,255,255,.7);font-size:11px;margin-top:4px;text-align:right}
    .reg-wrap{padding:14px 14px 4px}
    .reg-div{display:flex;align-items:center;gap:10px}
    .reg-div span{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tl);white-space:nowrap}
    .reg-div::before,.reg-div::after{content:"";flex:1;height:1px;background:var(--sand-d);opacity:.5}
    .days-wrap{padding:6px 12px 28px;display:flex;flex-direction:column;gap:8px}
    .card{background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(45,106,79,.1);transition:box-shadow .2s}
    .card.open{box-shadow:0 5px 22px rgba(45,106,79,.18)}
    .card.rainy .card-hdr{background:linear-gradient(135deg,var(--rd),var(--rm))}
    .card-hdr{background:linear-gradient(135deg,var(--g-mid),var(--g-light));padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .3s}
    .day-badge{background:rgba(255,255,255,.26);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0}
    .card-info{flex:1;min-width:0}
    .card-title{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
    .mbadge{font-size:10.5px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}
    .chev{color:rgba(255,255,255,.75);font-size:15px;flex-shrink:0;transition:transform .3s}
    .card.open .chev{transform:rotate(180deg)}
    .card-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
    .card-body.open{max-height:3200px}
    .body-inner{padding:14px 14px 16px}
    .wtog{display:flex;gap:5px;background:var(--sand);border-radius:11px;padding:4px;margin-bottom:14px}
    .wbtn{flex:1;padding:7px 8px;border:none;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--tm)}
    .wbtn.active.sunny{background:#F5A623;color:#fff;box-shadow:0 2px 6px rgba(245,166,35,.35)}
    .wbtn.active.rainy{background:var(--rm);color:#fff;box-shadow:0 2px 6px rgba(74,124,158,.35)}
    .slbl{font-size:10px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--tl);margin-bottom:7px;margin-top:14px}
    .slbl:first-of-type{margin-top:0}
    .attr-item{display:flex;align-items:flex-start;gap:9px;background:var(--beige);border-radius:11px;padding:10px 11px;cursor:pointer;text-decoration:none;transition:opacity .15s}
    .attr-item:active{opacity:.75}
    .card.rainy .attr-item{background:var(--rl)}
    .attr-em{font-size:19px;flex-shrink:0;line-height:1.3}
    .attr-body{flex:1;min-width:0}
    .attr-top{display:flex;align-items:flex-start;gap:6px;justify-content:space-between}
    .attr-name{font-size:13.5px;font-weight:600;color:var(--td);line-height:1.3;flex:1}
    .attr-rating{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-top:1px}
    .star{color:var(--star);font-size:12px}
    .rating-val{font-size:11.5px;font-weight:600;color:var(--tm)}
    .rating-cnt{font-size:10.5px;color:var(--tl)}
    .attr-note{font-size:12px;color:var(--tm);margin-top:3px;line-height:1.45}
    .maps-hint{font-size:10.5px;color:var(--g-mid);margin-top:4px;display:flex;align-items:center;gap:3px}
    .card.rainy .maps-hint{color:var(--rm)}
    .cost-tag{display:inline-block;background:rgba(45,106,79,0.12);color:var(--g-dark);font-size:10.5px;padding:2px 8px;border-radius:10px;margin-top:4px;margin-bottom:2px;font-weight:600}
    .transit{display:flex;align-items:center;gap:8px;padding:3px 6px;margin:2px 0}
    .transit-line{flex:1;height:1px;background:var(--sand-d);opacity:.4}
    .transit-txt{font-size:11px;color:var(--tl);white-space:nowrap}
    .rest-item{display:flex;align-items:flex-start;gap:9px;background:var(--sand);border-radius:11px;padding:9px 11px;cursor:pointer;text-decoration:none;transition:opacity .15s}
    .rest-item:active{opacity:.75}
    .card.rainy .rest-item{background:#e0eef7}
    .rest-em{font-size:18px;flex-shrink:0;line-height:1.3}
    .rest-body{flex:1;min-width:0}
    .rest-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
    .rest-name{font-size:13px;font-weight:600;color:var(--td)}
    .rest-type{font-size:10.5px;color:var(--tl);margin-top:2px}
    .rest-note{font-size:11.5px;color:var(--tm);margin-top:3px;line-height:1.4}
    .rest-list{display:flex;flex-direction:column;gap:6px}
    .stay-box{background:var(--g-pale);border-radius:11px;padding:11px 13px}
    .card.rainy .stay-box{background:var(--rl)}
    .stay-town{font-size:13px;font-weight:700;color:var(--g-dark);margin-bottom:6px}
    .card.rainy .stay-town{color:var(--rd)}
    .stay-note{font-size:11.5px;color:var(--tm);margin-bottom:8px;line-height:1.45}
    .stay-tiers{display:flex;flex-direction:column;gap:4px}
    .stay-tier{display:flex;align-items:baseline;gap:7px}
    .tier-tag{font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(45,106,79,.15);color:var(--g-dark);padding:2px 7px;border-radius:8px;flex-shrink:0;min-width:38px;text-align:center}
    .card.rainy .tier-tag{background:rgba(74,124,158,.15);color:var(--rd)}
    .tier-name{font-size:12.5px;color:var(--td);font-weight:500}
    .tier-price{font-size:11px;color:var(--tl);margin-left:auto;flex-shrink:0}
    .notes{background:var(--sand);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--tm);line-height:1.55;border-left:3px solid var(--sand-d);margin-top:14px}
    .card.rainy .notes{border-left-color:var(--rm)}
    .photo-strip{display:flex;gap:7px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none;margin-top:6px}
    .photo-strip::-webkit-scrollbar{display:none}
    .photo-thumb{width:120px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--sand),var(--sand-d));cursor:pointer;transition:opacity .15s}
    .photo-thumb:active{opacity:.8}
    .feature-panel{background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(45,106,79,.1);margin:6px 12px 4px}
    .feature-hdr{background:linear-gradient(135deg,#1B4332,var(--g-dark));padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
    .feature-hdr-title{color:#fff;font-size:14px;font-weight:700;flex:1}
    .feature-hdr-sub{color:rgba(255,255,255,.75);font-size:11px}
    .fchev{color:rgba(255,255,255,.75);font-size:15px;transition:transform .3s}
    .feature-panel.open .fchev{transform:rotate(180deg)}
    .feature-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
    .feature-body.open{max-height:9999px}
    .feature-inner{padding:14px}
    .ftabs{display:flex;gap:4px;background:var(--sand);border-radius:10px;padding:4px;margin-bottom:14px}
    .ftab{flex:1;padding:7px 4px;border:none;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;background:transparent;color:var(--tm);transition:all .2s}
    .ftab.active{background:#fff;color:var(--g-dark);box-shadow:0 1px 4px rgba(0,0,0,.1)}
    .ftab-pane{display:none}
    .ftab-pane.active{display:block}
    .budget-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
    .budget-table th{text-align:left;padding:6px 8px;background:var(--g-pale);color:var(--g-dark);font-size:11px;font-weight:700}
    .budget-table td{padding:6px 8px;border-bottom:1px solid var(--sand);color:var(--td)}
    .budget-table tr:nth-child(even) td{background:rgba(216,243,220,0.3)}
    .budget-table .total-row td{background:var(--g-pale);font-weight:700;color:var(--g-dark)}
    .route-text{font-size:12px;color:var(--td);background:var(--g-pale);border-radius:8px;padding:9px 11px;margin-bottom:12px;line-height:1.7;font-weight:500;word-break:break-all}
    .section-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tl);margin:14px 0 7px}
    .booking-group{margin-bottom:10px}
    .booking-group-lbl{font-size:12px;font-weight:700;color:var(--td);margin-bottom:5px}
    .booking-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--tm);margin-bottom:5px;line-height:1.5}
    .member-inputs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
    .member-inp{flex:1;min-width:80px;border:1.5px solid var(--sand-d);border-radius:8px;padding:6px 8px;font-size:12px;color:var(--td);background:#fff;font-family:inherit}
    .member-inp:focus{outline:none;border-color:var(--g-mid)}
    .expense-form{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end}
    .expense-form select,.expense-form input{border:1.5px solid var(--sand-d);border-radius:8px;padding:7px 9px;font-size:12.5px;color:var(--td);background:#fff;font-family:inherit}
    .expense-form select:focus,.expense-form input:focus{outline:none;border-color:var(--g-mid)}
    .expense-form input[type=number]{width:85px}
    .expense-form input[type=text]{flex:1;min-width:90px}
    .btn-add{background:var(--g-mid);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .btn-add:active{opacity:.8}
    .btn-clr{background:none;border:1.5px solid var(--sand-d);color:var(--tl);border-radius:8px;padding:5px 10px;font-size:11.5px;cursor:pointer;font-family:inherit}
    .expense-list{max-height:200px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
    .expense-list-item{display:flex;align-items:center;gap:7px;background:var(--beige);border-radius:8px;padding:7px 10px;font-size:12px}
    .eli-payer{font-weight:700;color:var(--g-dark);flex-shrink:0}
    .eli-amt{font-weight:700;color:var(--td);flex-shrink:0}
    .eli-desc{flex:1;color:var(--tm);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .eli-del{background:none;border:none;cursor:pointer;font-size:15px;color:var(--tl);padding:0 2px;line-height:1;flex-shrink:0}
    .expense-summary{background:var(--g-pale);border-radius:10px;padding:10px 12px;margin-bottom:10px}
    .expense-summary-row{display:flex;justify-content:space-between;font-size:12px;color:var(--tm);margin-bottom:4px}
    .expense-summary-row.total{font-weight:700;color:var(--td);font-size:13px;border-top:1px solid var(--sand-d);padding-top:6px;margin-top:4px}
    .settle-tx{display:flex;align-items:center;gap:6px;background:#fff;border-radius:8px;padding:8px 10px;font-size:12px;color:var(--td);margin-bottom:5px;border-left:3px solid var(--g-mid)}
    .settle-balanced{text-align:center;color:var(--g-dark);font-size:13px;font-weight:700;padding:10px;background:var(--g-pale);border-radius:8px}
    .packing-progress-bar-wrap{background:var(--sand);border-radius:6px;height:6px;overflow:hidden;margin-bottom:4px}
    .packing-progress-bar{height:100%;background:var(--g-mid);border-radius:6px;transition:width .3s}
    .packing-progress-lbl{font-size:11px;color:var(--tl);margin-bottom:8px;text-align:right}
    .packing-cat{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--g-dark);margin:12px 0 6px}
    .packing-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--td);margin-bottom:5px;cursor:pointer;line-height:1.3}
    .packing-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--g-mid);cursor:pointer;flex-shrink:0}
    .packing-item.checked{color:var(--tl);text-decoration:line-through}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
    .info-card{background:var(--beige);border-radius:10px;padding:10px 11px}
    .info-card-title{font-size:12px;font-weight:700;color:var(--td);margin-bottom:6px}
    .info-card ul{list-style:none;padding:0}
    .info-card ul li{font-size:11px;color:var(--tm);margin-bottom:4px;line-height:1.4}
    .converter{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .conv-group{display:flex;flex-direction:column}
    .conv-lbl{font-size:11px;color:var(--tl);margin-bottom:3px}
    .conv-inp{border:1.5px solid var(--sand-d);border-radius:8px;padding:7px 10px;font-size:13px;width:115px;color:var(--td);background:#fff;font-family:inherit}
    .conv-inp:focus{outline:none;border-color:var(--g-mid)}
    .conv-sym{font-size:16px;color:var(--tl);padding-bottom:6px}
    .conv-note{font-size:10.5px;color:var(--tl);margin-top:4px}
    .currency-ref{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
    .currency-ref-cell{background:var(--g-pale);border-radius:7px;padding:6px 5px;text-align:center}
    .currency-ref-nzd{font-size:11px;font-weight:700;color:var(--g-dark)}
    .currency-ref-twd{font-size:10px;color:var(--tm)}
    .footer{text-align:center;padding:18px 16px 32px;color:var(--tl);font-size:11.5px;line-height:1.9}
  </style>
</head>

<div id="appRoot"></div>

];

function saveMembers(){ localStorage.setItem("nz_members", JSON.stringify(members)); }
function saveExpenses(){ localStorage.setItem("nz_expenses", JSON.stringify(expenses)); }
function savePacking(){ localStorage.setItem("nz_packing", JSON.stringify(packingState)); }

function toggleDay(n){ S.open = S.open===n ? null : n; render(); }
function setWx(n,m){ S.wx[n]=m; render(); }
function mapsClick(url,e){ e.stopPropagation(); if(url) window.open(url,"_blank"); }

function stars(r){ return r>0 ? '<span class="star">★</span><span class="rating-val">'+r+'</span>' : ""; }
function reviewTxt(r){ return r ? '<span class="rating-cnt">('+r+')</span>' : ""; }
function mapsIcon(url){ return url ? '<span class="maps-hint">📍 地圖</span>' : ""; }

function lookupPhotos(name){
  const key = Object.keys(PHOTOS).find(k => name.includes(k));
  return key ? PHOTOS[key] : [];
}

function lookupCost(name){
  const key = Object.keys(COSTS).find(k => name.includes(k));
  return key ? COSTS[key] : null;
}

function renderPhotos(name){
  const photos = lookupPhotos(name);
  if(!photos.length) return "";
  const imgs = photos.map(function(ph){
    return '<img class="photo-thumb" src="'+ph+'" loading="lazy" onerror="this.style.display=\'none\'" onclick="event.stopPropagation();window.open(this.src,\'_blank\')" alt="">';
  }).join("");
  return '<div class="photo-strip">'+imgs+"</div>";
}

function renderCost(name){
  const cost = lookupCost(name);
  if(!cost) return "";
  return '<span class="cost-tag">💰 '+cost+"</span>";
}

function renderAttr(a, isRainy){
  const clickable = a.maps ? 'onclick="mapsClick(\"'+a.maps+'\",event)"' : "";
  const transit = a.to_next ? '<div class="transit"><div class="transit-line"></div><span class="transit-txt">↕ '+a.to_next+'</span><div class="transit-line"></div></div>' : "";

function calcSettlement(exps, mems){
  const paid = Array(mems.length).fill(0);
  exps.forEach(function(e){ if(e.payer>=0 && e.payer<mems.length) paid[e.payer] += e.amount; });
  const total = paid.reduce(function(s,v){return s+v;},0);
  const avg = total / mems.length;
  const bal = paid.map(function(pp){ return +(pp - avg).toFixed(2); });
  const pos = bal.map(function(b,i){return {i,b};}).filter(function(x){return x.b>0.01;}).sort(function(a,b){return b.b-a.b;});
  const neg = bal.map(function(b,i){return {i,b};}).filter(function(x){return x.b<-0.01;}).sort(function(a,b){return a.b-b.b;});
  const tx = [];
  let pi=0,ni=0;
  while(pi<pos.length && ni<neg.length){
    const amt = Math.min(pos[pi].b, -neg[ni].b);
    tx.push({from:neg[ni].i, to:pos[pi].i, amount:+amt.toFixed(2)});
    pos[pi].b -= amt; neg[ni].b += amt;
    if(pos[pi].b < 0.01) pi++;
    if(neg[ni].b > -0.01) ni++;
  }
  return {paid, total, avg, tx};
}

  PACKING_CATS.forEach(function(cat){
    html += "<div class=\"packing-cat\">"+cat.cat+"</div>";

        "<input type=\"checkbox\" "+(checked?"checked":"")+" onchange=\"togglePacking('"+key.replace(/'/g,"&#39;")+"')\" />"+
