<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 紐西蘭南島 14 天</title>
  <style>
    :root {
      --g-dark:  #2D6A4F; --g-mid: #40916C; --g-light: #74C69D; --g-pale: #D8F3DC;
      --beige:   #F7F2E8; --sand: #EBE2CE; --sand-d: #C9B99A; --cream: #FFFDF6;
      --td: #1B2D22; --tm: #4A5C4E; --tl: #8A9E8E;
      --rd: #2C4F6A; --rm: #4A7C9E; --rl: #D4EAF7;
      --amber: #F59E0B; --star: #F5A623;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--beige);color:var(--td);max-width:540px;margin:0 auto;min-height:100vh}

    /* ── Header ── */
    .hdr{background:linear-gradient(150deg,var(--g-dark),var(--g-mid));padding:18px 18px 14px;position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,.2)}
    .hdr-row{display:flex;align-items:center;gap:11px}
    .hdr-leaf{font-size:28px;flex-shrink:0}
    .hdr-t{color:#fff;font-size:18px;font-weight:700}
    .hdr-s{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px}
    .day-pill{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
    .prog-wrap{margin-top:12px}
    .prog-track{background:rgba(255,255,255,.22);border-radius:8px;height:5px;overflow:hidden}
    .prog-fill{height:100%;background:var(--g-pale);border-radius:8px;transition:width .4s ease;width:0%}
    .prog-lbl{color:rgba(255,255,255,.7);font-size:11px;margin-top:4px;text-align:right}

    /* ── Region divider ── */
    .reg-wrap{padding:14px 14px 4px}
    .reg-div{display:flex;align-items:center;gap:10px}
    .reg-div span{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tl);white-space:nowrap}
    .reg-div::before,.reg-div::after{content:'';flex:1;height:1px;background:var(--sand-d);opacity:.5}

    /* ── Days list ── */
    .days-wrap{padding:6px 12px 28px;display:flex;flex-direction:column;gap:8px}

    /* ── Day card ── */
    .card{background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(45,106,79,.1);transition:box-shadow .2s}
    .card.open{box-shadow:0 5px 22px rgba(45,106,79,.18)}
    .card.rainy .card-hdr{background:linear-gradient(135deg,var(--rd),var(--rm))}

    /* ── Card header ── */
    .card-hdr{background:linear-gradient(135deg,var(--g-mid),var(--g-light));padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .3s}
    .day-badge{background:rgba(255,255,255,.26);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0}
    .card-info{flex:1;min-width:0}
    .card-title{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
    .mbadge{font-size:10.5px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}
    .chev{color:rgba(255,255,255,.75);font-size:15px;flex-shrink:0;transition:transform .3s}
    .card.open .chev{transform:rotate(180deg)}

    /* ── Body ── */
    .card-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
    .card-body.open{max-height:2400px}
    .body-inner{padding:14px 14px 16px}

    /* Weather toggle */
    .wtog{display:flex;gap:5px;background:var(--sand);border-radius:11px;padding:4px;margin-bottom:14px}
    .wbtn{flex:1;padding:7px 8px;border:none;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--tm)}
    .wbtn.active.sunny{background:#F5A623;color:#fff;box-shadow:0 2px 6px rgba(245,166,35,.35)}
    .wbtn.active.rainy{background:var(--rm);color:#fff;box-shadow:0 2px 6px rgba(74,124,158,.35)}

    /* Section label */
    .slbl{font-size:10px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--tl);margin-bottom:7px;margin-top:14px}
    .slbl:first-of-type{margin-top:0}

    /* ── Attraction item ── */
    .attr-item{display:flex;align-items:flex-start;gap:9px;background:var(--beige);border-radius:11px;padding:10px 11px;cursor:pointer;text-decoration:none;transition:opacity .15s}
    .attr-item:active{opacity:.75}
    .card.rainy .attr-item{background:var(--rl)}
    .attr-em{font-size:19px;flex-shrink:0;line-height:1.3}
    .attr-body{flex:1;min-width:0}
    .attr-top{display:flex;align-items:flex-start;gap:6px;justify-content:space-between}
    .attr-name{font-size:13.5px;font-weight:600;color:var(--td);line-height:1.3;flex:1}
    .attr-rating{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-top:1px}
    .star{color:var(--star);font-size:12px}
    .rating-val{font-size:11.5px;font-weight:600;color:var(--tm)}
    .rating-cnt{font-size:10.5px;color:var(--tl)}
    .attr-note{font-size:12px;color:var(--tm);margin-top:3px;line-height:1.45}
    .maps-hint{font-size:10.5px;color:var(--g-mid);margin-top:4px;display:flex;align-items:center;gap:3px}
    .card.rainy .maps-hint{color:var(--rm)}

    /* Transit connector */
    .transit{display:flex;align-items:center;gap:8px;padding:3px 6px;margin:2px 0}
    .transit-line{flex:1;height:1px;background:var(--sand-d);opacity:.4}
    .transit-txt{font-size:11px;color:var(--tl);white-space:nowrap}

    /* ── Restaurant item ── */
    .rest-item{display:flex;align-items:flex-start;gap:9px;background:var(--sand);border-radius:11px;padding:9px 11px;cursor:pointer;text-decoration:none;transition:opacity .15s}
    .rest-item:active{opacity:.75}
    .card.rainy .rest-item{background:#e0eef7}
    .rest-em{font-size:18px;flex-shrink:0;line-height:1.3}
    .rest-body{flex:1;min-width:0}
    .rest-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
    .rest-name{font-size:13px;font-weight:600;color:var(--td)}
    .rest-type{font-size:10.5px;color:var(--tl);margin-top:2px}
    .rest-note{font-size:11.5px;color:var(--tm);margin-top:3px;line-height:1.4}
    .rest-list{display:flex;flex-direction:column;gap:6px}

    /* ── Stay section ── */
    .stay-box{background:var(--g-pale);border-radius:11px;padding:11px 13px}
    .card.rainy .stay-box{background:var(--rl)}
    .stay-town{font-size:13px;font-weight:700;color:var(--g-dark);margin-bottom:6px}
    .card.rainy .stay-town{color:var(--rd)}
    .stay-note{font-size:11.5px;color:var(--tm);margin-bottom:8px;line-height:1.45}
    .stay-tiers{display:flex;flex-direction:column;gap:4px}
    .stay-tier{display:flex;align-items:baseline;gap:7px}
    .tier-tag{font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(45,106,79,.15);color:var(--g-dark);padding:2px 7px;border-radius:8px;flex-shrink:0;min-width:38px;text-align:center}
    .card.rainy .tier-tag{background:rgba(74,124,158,.15);color:var(--rd)}
    .tier-name{font-size:12.5px;color:var(--td);font-weight:500}
    .tier-price{font-size:11px;color:var(--tl);margin-left:auto;flex-shrink:0}

    /* Notes box */
    .notes{background:var(--sand);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--tm);line-height:1.55;border-left:3px solid var(--sand-d);margin-top:14px}
    .card.rainy .notes{border-left-color:var(--rm)}

    /* Footer */
    .footer{text-align:center;padding:18px 16px 32px;color:var(--tl);font-size:11.5px;line-height:1.9}
  </style>
</head>

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const S = { open: null, wx: {} };

function toggleDay(n){ S.open = S.open===n ? null : n; render(); }
function setWx(n,m){ S.wx[n]=m; render(); }

function mapsClick(url, e){
  e.stopPropagation();
  if(url) window.open(url, '_blank');
}

// ═══════════════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════════════
function stars(r){ return r>0 ? `<span class="star">★</span><span class="rating-val">${r}</span>` : ''; }
function reviewTxt(r){ return r ? `<span class="rating-cnt">(${r})</span>` : ''; }
function mapsIcon(url){ return url ? `<span class="maps-hint">📍 地圖</span>` : ''; }

function renderAttr(a, isRainy){
  const clickable = a.maps ? `onclick="mapsClick('${a.maps}',event)"` : '';
  return `
    <div class="attr-item" ${clickable} role="${a.maps?'link':''}" tabindex="${a.maps?0:-1}">
      <span class="attr-em">${a.emoji}</span>
      <div class="attr-body">
        <div class="attr-top">
          <span class="attr-name">${a.name}</span>
          <span class="attr-rating">${stars(a.rating)} ${reviewTxt(a.reviews)}</span>
        </div>
        <div class="attr-note">${a.note}</div>
        ${mapsIcon(a.maps)}
      </div>
    </div>
    ${a.to_next ? `<div class="transit"><div class="transit-line"></div><span class="transit-txt">↕ ${a.to_next}</span><div class="transit-line"></div></div>` : ''}
  `;
}

function renderRest(r){
  const clickable = r.maps ? `onclick="mapsClick('${r.maps}',event)"` : '';
  return `
    <div class="rest-item" ${clickable} role="${r.maps?'link':''}" tabindex="${r.maps?0:-1}">
      <span class="rest-em">${r.emoji}</span>
      <div class="rest-body">
        <div class="rest-top">
          <div>
            <div class="rest-name">${r.name}</div>
            <div class="rest-type">${r.cuisine}</div>
          </div>
          <span class="attr-rating">${stars(r.rating)} ${reviewTxt(r.reviews)}</span>
        </div>
        <div class="rest-note">${r.note}</div>
        ${mapsIcon(r.maps)}
      </div>
    </div>
  `;
}

function renderStay(stay, isRainy){
  const tiers = stay.options.map(o=>`
    <div class="stay-tier">
      <span class="tier-tag">${o.tier}</span>
      <span class="tier-name">${o.name}</span>
      <span class="tier-price">NZD ${o.nzd}</span>
    </div>`).join('');
  return `
    <div class="stay-box">
      <div class="stay-town">🏨 ${stay.town}</div>
      ${stay.note ? `<div class="stay-note">${stay.note}</div>` : ''}
      <div class="stay-tiers">${tiers}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const root = document.getElementById('appRoot');
  let html = '<div class="reg-wrap"><div class="reg-div"><span>🏔️ 南島行程</span></div></div><div class="days-wrap">';

  tripData.days.forEach(day=>{
    const isOpen  = S.open === day.day;
    const wx      = S.wx[day.day] || 'sunny';
    const isRainy = wx === 'rainy';
    const plan    = day[wx];

    const attrs   = plan.attractions.map(a=>renderAttr(a,isRainy)).join('');
    const rests   = plan.restaurants.map(r=>renderRest(r)).join('');

    html += `
    <div class="card${isOpen?' open':''}${isRainy?' rainy':''}">
      <div class="card-hdr" onclick="toggleDay(${day.day})">
        <div class="day-badge">Day ${day.day}</div>
        <div class="card-info">
          <span class="card-title">${day.title}</span>
          <div class="card-meta">
            <span class="mbadge">${day.drive}</span>
            ${isRainy?'<span class="mbadge">🌧 備案</span>':''}
          </div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="card-body${isOpen?' open':''}">
        <div class="body-inner">
          <div class="wtog">
            <button class="wbtn sunny${wx==='sunny'?' active':''}" onclick="setWx(${day.day},'sunny');event.stopPropagation()">☀️ 晴天</button>
            <button class="wbtn rainy${wx==='rainy'?' active':''}" onclick="setWx(${day.day},'rainy');event.stopPropagation()">🌧 下雨了</button>
          </div>

          <div class="slbl">📍 景點行程</div>
          ${attrs}

          <div class="slbl">🍽️ 推薦餐廳</div>
          <div class="rest-list">${rests}</div>

          <div class="slbl">🏨 今晚住宿建議</div>
          ${renderStay(day.stay, isRainy)}

          <div class="notes">🛒 超市：${plan.supermarket}<br><br>💡 ${plan.notes}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  root.innerHTML = html;
  updateHeader();
}

function updateHeader(){
  const viewed = new Set([...Object.keys(S.wx).map(Number), ...(S.open?[S.open]:[])]).size;
  const rainy  = Object.values(S.wx).filter(v=>v==='rainy').length;
  document.getElementById('progFill').style.width = Math.min(Math.round(viewed/14*100),100)+'%';
  document.getElementById('dayPill').textContent  = S.open ? `Day ${S.open} / 14` : '— / 14';
  document.getElementById('progLbl').textContent  =
    S.open ? `Day ${S.open} 已展開${rainy?` · ${rainy} 天切換備案`:''}` :
    viewed  ? `已查看 ${viewed} / 14 天` : '點擊任一天展開行程';
}

render();
</script>
</body>
</html>
